name: Python Tests

# This tells GitHub WHEN to run the action. 
# We are setting it to run on every push to the "main" branch.
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Get your code from the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up a Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11" # You can change this to match your Python version

    # Step 3: Install pytest
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # Step 4: Run the tests!
    - name: Run pytest
      run: |
        pytest -v
